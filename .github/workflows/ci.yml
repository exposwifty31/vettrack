name: CI — VetTrack

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Never cancel an in-flight main run — it may be mid-deploy, and a canceled
# `railway up` upload can still finish building after a newer one (out-of-order deploy).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Tests & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vettrack
          POSTGRES_PASSWORD: vettrack
          POSTGRES_DB: vettrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://vettrack:vettrack@localhost:5432/vettrack_test
      SESSION_SECRET: ci-test-secret-that-is-long-enough-32chars
      PORT: 3001

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v7

      - name: 📦 pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: 🟢 Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔷 TypeScript (frontend)
        run: pnpm exec tsc --noEmit

      - name: 🔷 TypeScript (server)
        run: pnpm exec tsc --noEmit --project tsconfig.server-check.json

      - name: 🏗️ Frontend build
        run: |
          export VITE_CLERK_PUBLISHABLE_KEY="${VITE_CLERK_PUBLISHABLE_KEY:-pk_test_ci_dummy_publishable_key}"
          pnpm build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      # Apply all `migrations/*.sql` via `server/migrate.ts` (tracks `vt_migrations`).
      # `pnpm db:migrate` (drizzle-kit) only runs entries in `migrations/meta/_journal.json`.
      - name: 🗄️ Database migrations
        run: pnpm migrate

      - name: 🧪 Test suite
        run: pnpm test

  integration-ops:
    name: 🔌 Integration ops
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vettrack
          POSTGRES_PASSWORD: vettrack
          POSTGRES_DB: vettrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://vettrack:vettrack@localhost:5432/vettrack_test
      SESSION_SECRET: ci-test-secret-that-is-long-enough-32chars
      PORT: 3001

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v7

      - name: 📦 pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: 🟢 Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🗄️ Database migrations
        run: pnpm migrate

      - name: 🔌 Integration ops suite
        run: pnpm test:integration:ops

  architecture-gates:
    name: 🏛️ Architecture gates (G1)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 📦 pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: 🟢 Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📦 @vettrack/contracts gate
        run: bash scripts/ci/contracts-gate.sh

      - name: 🔷 TypeScript (frontend)
        run: pnpm exec tsc --noEmit

      - name: 🔷 TypeScript (server)
        run: pnpm exec tsc --noEmit --project tsconfig.server-check.json

      - name: 🛡️ dependency-cruiser
        run: pnpm exec depcruise --config .dependency-cruiser.cjs --output-type err --ignore-known .dependency-cruiser-known-violations.json server src

      - name: 🔄 madge cycle baseline
        run: node scripts/architecture/compare-cycles.mjs

      - name: 🏥 tenant query lint (warn only, G3)
        env:
          TENANT_LINT_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'origin/main' }}
        run: |
          node scripts/architecture/tenant-query-lint.mjs --warn-only --touched --base "${TENANT_LINT_BASE}"
        continue-on-error: true

      - name: 🔑 query key registry drift (warn only, G4)
        run: node scripts/architecture/collect-query-keys.mjs --warn-only
        continue-on-error: true

      - name: 🛣️ route contract drift (warn only, G5)
        run: node scripts/architecture/extract-express-routes.mjs --warn-only
        continue-on-error: true

      # TODO: remove --no-exit-code once the dead-code baseline is established and violations are resolved
      - name: Dead code check (knip)
        run: pnpm knip --no-exit-code
        continue-on-error: true

  deploy:
    name: 🚢 Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, integration-ops, architecture-gates]
    # vars.RAILWAY_USE_CLI_DEPLOY (repo *variable*, not secret) is the deploy kill-switch.
    # workflow_dispatch on main = "redeploy main" recovery button.
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
      && vars.RAILWAY_USE_CLI_DEPLOY == 'true'
    # Serialize production deploys across runs; never cancel one mid-flight.
    concurrency:
      group: railway-production-deploy
      cancel-in-progress: false

    env:
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
      DB_CONFIG_ENCRYPTION_KEY: ${{ secrets.DB_CONFIG_ENCRYPTION_KEY }}
      CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
      DATA_INTEGRITY_HEALTH_TOKEN: ${{ secrets.DATA_INTEGRITY_HEALTH_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
      RAILWAY_WORKER_SERVICE: ${{ secrets.RAILWAY_WORKER_SERVICE }}
      PORT: 3001

    steps:
      # Pinned SHA + no persisted credentials: this job holds RAILWAY_TOKEN and
      # uploads the checkout to Railway — keep the git credential out of it.
      - name: ⬇️ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🚀 Deploy
        run: bash deploy.sh --no-color

  gate:
    name: ✅ Merge gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test, integration-ops, architecture-gates, deploy]
    if: always()

    steps:
      - name: Require green checks
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Tests failed — blocking merge"
            exit 1
          fi
          if [[ "${{ needs.integration-ops.result }}" != "success" ]]; then
            echo "❌ Integration ops failed — blocking merge"
            exit 1
          fi
          if [[ "${{ needs.architecture-gates.result }}" != "success" ]]; then
            echo "❌ Architecture gates failed — blocking merge"
            exit 1
          fi
          if [[ "${{ needs.deploy.result }}" != "success" ]]; then
            if [[ "${{ needs.deploy.result }}" == "skipped" ]]; then
              echo "ℹ️ Railway deploy skipped (RAILWAY_USE_CLI_DEPLOY disabled)"
            else
              echo "❌ Railway deploy job did not succeed"
              exit 1
            fi
          fi
          echo "✅ All required checks passed"
