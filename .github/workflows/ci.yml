name: CI — VetTrack

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Tests & typecheck
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vettrack
          POSTGRES_PASSWORD: vettrack
          POSTGRES_DB: vettrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://vettrack:vettrack@localhost:5432/vettrack_test
      SESSION_SECRET: ci-test-secret-that-is-long-enough-32chars
      PORT: 3001

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🟢 Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔷 TypeScript (frontend)
        run: pnpm exec tsc --noEmit

      - name: 🔷 TypeScript (server)
        run: pnpm exec tsc --noEmit --project tsconfig.server-check.json

      - name: 🏗️ Frontend build
        run: |
          export VITE_CLERK_PUBLISHABLE_KEY="${VITE_CLERK_PUBLISHABLE_KEY:-pk_test_ci_dummy_publishable_key}"
          pnpm build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      # Apply all `migrations/*.sql` via `server/migrate.ts` (tracks `vt_migrations`).
      # `pnpm db:migrate` (drizzle-kit) only runs entries in `migrations/meta/_journal.json`.
      - name: 🗄️ Database migrations
        run: pnpm migrate

      - name: 🧪 Test suite
        run: pnpm test

  deploy-check:
    name: 🚀 Deploy pre-flight
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.RAILWAY_USE_CLI_DEPLOY == 'true'

    env:
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
      DB_CONFIG_ENCRYPTION_KEY: ${{ secrets.DB_CONFIG_ENCRYPTION_KEY }}
      PORT: 3001

    steps:
      - name: 🔎 Resolve deploy pre-flight availability
        id: preflight_guard
        run: |
          missing=0
          for var in DATABASE_URL REDIS_URL SESSION_SECRET CLERK_SECRET_KEY VITE_CLERK_PUBLISHABLE_KEY ALLOWED_ORIGIN DB_CONFIG_ENCRYPTION_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing $var for deploy pre-flight."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: ℹ️ Skip pre-flight (secrets unavailable)
        if: steps.preflight_guard.outputs.enabled != 'true'
        run: echo "Skipping deploy pre-flight because required deploy secrets are unavailable in this context."

      - name: ⬇️ Checkout
        if: steps.preflight_guard.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: 📦 pnpm
        if: steps.preflight_guard.outputs.enabled == 'true'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🟢 Node.js
        if: steps.preflight_guard.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: 📥 Install dependencies
        if: steps.preflight_guard.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: ✅ Pre-flight env check
        if: steps.preflight_guard.outputs.enabled == 'true'
        run: bash deploy.sh --check --no-color

  deploy:
    name: 🚢 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test, deploy-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.RAILWAY_USE_CLI_DEPLOY == 'true'

    env:
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
      DB_CONFIG_ENCRYPTION_KEY: ${{ secrets.DB_CONFIG_ENCRYPTION_KEY }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
      RAILWAY_USE_CLI_DEPLOY: ${{ secrets.RAILWAY_USE_CLI_DEPLOY }}
      PORT: 3001

    steps:
      - name: 🔎 Resolve Railway deploy mode
        id: railway_mode
        run: |
          if [[ "${RAILWAY_USE_CLI_DEPLOY}" == "true" ]]; then
            echo "use_cli=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_cli=false" >> "$GITHUB_OUTPUT"
          fi

      - name: ⬇️ Checkout
        if: steps.railway_mode.outputs.use_cli == 'true'
        uses: actions/checkout@v4

      - name: 🚀 Deploy
        if: steps.railway_mode.outputs.use_cli == 'true'
        run: bash deploy.sh --no-color

  gate:
    name: ✅ Merge gate
    runs-on: ubuntu-latest
    needs: [test, deploy-check, deploy]
    if: always()

    steps:
      - name: Require green checks
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Tests failed — blocking merge"
            exit 1
          fi
          if [[ "${{ needs.deploy-check.result }}" != "success" ]]; then
            if [[ "${{ needs.deploy-check.result }}" == "skipped" ]]; then
              echo "ℹ️ Deploy pre-flight skipped (RAILWAY_USE_CLI_DEPLOY disabled)"
            else
              echo "❌ Deploy pre-flight did not succeed — blocking merge"
              exit 1
            fi
          fi
          if [[ "${{ needs.deploy.result }}" != "success" ]]; then
            if [[ "${{ needs.deploy.result }}" == "skipped" ]]; then
              echo "ℹ️ Railway deploy skipped (RAILWAY_USE_CLI_DEPLOY disabled)"
            else
              echo "❌ Railway deploy job did not succeed"
              exit 1
            fi
          fi
          echo "✅ All required checks passed"
