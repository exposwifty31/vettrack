# Default CI browser tests — local API only (127.0.0.1:3001).
# Runs `pnpm test:playwright:ci` (PW_SUITE=ci): e2e/flows, pwa, phase-9-drills only.
# Never runs signup-flow, ui-smoke, example, staging-*, or e2e/simulation (workday).
name: Playwright Tests

on:
  push:
    branches: [main, master, staging]
  pull_request:
    # Base branch of the PR (includes PRs targeting staging; see #364).
    branches: [main, master, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🎭 Playwright E2E (shard ${{ matrix.shard }})
    timeout-minutes: 45
    runs-on: ubuntu-latest

    # Split the allowlisted CI suite across parallel shards to cut PR
    # feedback time. `fail-fast: false` keeps every shard reporting.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vettrack
          POSTGRES_PASSWORD: vettrack
          POSTGRES_DB: vettrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U vettrack -d vettrack_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://vettrack:vettrack@127.0.0.1:5432/vettrack_test
      SESSION_SECRET: ci-test-secret-that-is-long-enough-32chars
      PORT: 3001
      # E2E API must stay NODE_ENV=development (schedulers + SSE outbox). PLAYWRIGHT_E2E
      # relaxes per-IP rate limits — see shouldSkipPerIpApiThrottles in rate-limiters.ts.
      PLAYWRIGHT_E2E: "true"

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🟢 Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🌐 Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: 🏗️ Build frontend
        run: |
          export VITE_CLERK_PUBLISHABLE_KEY="${VITE_CLERK_PUBLISHABLE_KEY:-pk_test_ci_dummy_publishable_key}"
          pnpm build
        env:
          NODE_ENV: production
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: 🗄️ Database migrations
        run: pnpm migrate

      - name: 🚀 Start app for Playwright
        run: pnpm start:playwright-api > /tmp/vettrack-playwright.log 2>&1 &

      - name: ⏳ Wait for API readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3001/api/healthz > /dev/null; then
              echo "✅ API ready"
              exit 0
            fi
            sleep 2
          done
          echo "❌ API did not become ready at http://127.0.0.1:3001/api/healthz"
          tail -n 200 /tmp/vettrack-playwright.log || true
          exit 1

      - name: 🌱 Seed E2E fixtures
        run: pnpm seed:dev:e2e

      # Safe allowlist only — not signup, ui-smoke, or staging specs.
      # `--shard=N/total` splits the allowlist deterministically per job.
      - name: 🎭 Run Playwright tests
        run: pnpm test:playwright:ci --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          TEST_BASE_URL: http://127.0.0.1:3001

      - name: 📤 Upload dev log on failure
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: vettrack-playwright-dev-log-shard-${{ matrix.shard }}
          path: /tmp/vettrack-playwright.log
          retention-days: 30

      - name: 📊 Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30
