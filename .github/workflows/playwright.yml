name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm install -g pnpm && pnpm install
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps
    - name: Start app for Playwright
      run: pnpm dev:ci > /tmp/vettrack-playwright.log 2>&1 &
    - name: Wait for API readiness
      run: |
        for i in {1..60}; do
          if curl -fsS http://127.0.0.1:3001/api/healthz > /dev/null; then
            exit 0
          fi
          sleep 2
        done
        echo "API did not become ready at http://127.0.0.1:3001/api/healthz"
        tail -n 200 /tmp/vettrack-playwright.log || true
        exit 1
    - name: Run Playwright tests
      run: pnpm exec playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: vettrack-playwright-dev-log
        path: /tmp/vettrack-playwright.log
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
