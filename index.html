<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Installed-PWA blank-screen recovery. If a built /assets/* script
      // fails to load — typically when the SW serves a stale index.html
      // whose hashed bundle URL no longer exists on the server, or when
      // the chunk was evicted by an activate-time cache wipe — React
      // never mounts and the user sees a blank window with no reload
      // affordance. Recover once by unregistering all service workers,
      // deleting every vettrack-* cache, and reloading.
      //
      // Loop guard: a sessionStorage flag (auto-clears on PWA window
      // close) blocks reload loops. When sessionStorage is unavailable
      // (private browsing, restricted WebViews, storage-full conditions),
      // we fall back to a one-shot URL query parameter that survives the
      // reload. If both guards are unavailable we refuse to reload at all
      // rather than risk a loop in a standalone PWA window with no
      // address bar / stop button.
      (function () {
        var STORAGE_GUARD_KEY = "vt_blank_recovery_inflight";
        var URL_GUARD_PARAM = "_vt_recovered";

        function isBuiltAssetScript(target) {
          return (
            target &&
            target.tagName === "SCRIPT" &&
            typeof target.src === "string" &&
            target.src.indexOf("/assets/") !== -1
          );
        }

        function readUrlGuard() {
          try {
            return (
              new URL(window.location.href).searchParams.get(URL_GUARD_PARAM) ===
              "1"
            );
          } catch (e) {
            return false;
          }
        }

        function stripUrlGuard() {
          try {
            var url = new URL(window.location.href);
            if (!url.searchParams.has(URL_GUARD_PARAM)) return;
            url.searchParams.delete(URL_GUARD_PARAM);
            var qs = url.searchParams.toString();
            var path =
              url.pathname + (qs ? "?" + qs : "") + (url.hash || "");
            window.history.replaceState(null, "", path);
          } catch (e) {}
        }

        // Snapshot the URL guard before stripping; this is the in-memory
        // signal that we just completed a recovery on this navigation.
        var alreadyRecoveredThisNavigation = readUrlGuard();
        if (alreadyRecoveredThisNavigation) stripUrlGuard();

        function readStorageGuard() {
          try {
            return sessionStorage.getItem(STORAGE_GUARD_KEY) === "1";
          } catch (e) {
            return false;
          }
        }

        function writeStorageGuard() {
          try {
            sessionStorage.setItem(STORAGE_GUARD_KEY, "1");
            return true;
          } catch (e) {
            return false;
          }
        }

        function reload(useUrlFallback) {
          if (useUrlFallback) {
            try {
              var url = new URL(window.location.href);
              url.searchParams.set(URL_GUARD_PARAM, "1");
              window.location.replace(url.toString());
              return;
            } catch (e) {
              // URL construction / navigation API threw — refuse to reload
              // rather than risk a loop with no guard in place.
              return;
            }
          }
          try {
            window.location.reload();
          } catch (e) {}
        }

        function recover(useUrlFallback) {
          var pending = [];
          try {
            if ("serviceWorker" in navigator) {
              pending.push(
                navigator.serviceWorker
                  .getRegistrations()
                  .then(function (regs) {
                    return Promise.all(
                      regs.map(function (r) {
                        return r.unregister().catch(function () {});
                      })
                    );
                  })
                  .catch(function () {})
              );
            }
            if (typeof caches !== "undefined" && caches.keys) {
              pending.push(
                caches
                  .keys()
                  .then(function (keys) {
                    return Promise.all(
                      keys
                        .filter(function (k) {
                          return k.indexOf("vettrack-") === 0;
                        })
                        .map(function (k) {
                          return caches.delete(k).catch(function () {});
                        })
                    );
                  })
                  .catch(function () {})
              );
            }
          } catch (e) {}
          var done = function () {
            reload(useUrlFallback);
          };
          if (pending.length === 0) return done();
          Promise.all(pending).then(done, done);
        }

        window.addEventListener(
          "error",
          function (event) {
            if (!isBuiltAssetScript(event.target)) return;
            // Already recovered on this navigation (URL marker present on
            // load) or earlier in this session (sessionStorage marker set).
            if (alreadyRecoveredThisNavigation) return;
            if (readStorageGuard()) return;
            // Try to persist a guard. If sessionStorage works we'll loop-guard
            // via storage on the next load; otherwise we'll loop-guard via
            // the URL parameter set by reload(true). If neither can be set,
            // reload(true) will refuse to reload at all.
            var persisted = writeStorageGuard();
            recover(!persisted);
          },
          true
        );
      })();
    </script>

    <!-- Primary Meta -->

    <meta name="keywords" content="veterinary equipment tracking, vet hospital QR tracking, ER veterinary workflow tool, veterinary management software, animal hospital equipment management" />
    <meta name="author" content="VetTrack" />
    <link rel="canonical" href="https://vettrack.uk/" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vettrack.uk/" />
    <meta property="og:title" content="VetTrack — Veterinary Equipment QR Tracking System" />
    <meta property="og:description" content="Mobile-first QR equipment tracking for veterinary hospitals and ER clinics. Real-time status, offline support, issue alerts, and shift handoffs — all from any device." />
    <meta property="og:image" content="https://vettrack.uk/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="VetTrack" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://vettrack.uk/" />
    <meta name="twitter:title" content="VetTrack — Veterinary Equipment QR Tracking System" />
    <meta name="twitter:description" content="Mobile-first QR equipment tracking for veterinary hospitals and ER clinics. Real-time status, offline support, issue alerts, and shift handoffs." />
    <meta name="twitter:image" content="https://vettrack.uk/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "VetTrack",
      "url": "https://vettrack.uk",
      "description": "Mobile-first QR code equipment tracking system for veterinary hospitals and emergency clinics. Features real-time status updates, offline support, issue reporting, alert management, and monthly PDF reports.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "QR code equipment scanning",
        "Real-time equipment status tracking",
        "Offline-first with automatic sync",
        "Issue reporting with photo evidence",
        "Alert management with severity levels",
        "Shift handoff and checkout workflows",
        "Monthly PDF reports",
        "Role-based access control"
      ],
      "screenshot": "https://vettrack.uk/og-image.png",
      "provider": {
        "@type": "Organization",
        "name": "VetTrack"
      }
    }
    </script>

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Mobile / PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "default" renders system-chrome status bar (dark text on white/grey
         bar). Safe for any app color scheme. "black-translucent" overlays the
         bar on top of the app content — only useful when the very top of the
         app is always dark; otherwise the time/battery text becomes invisible. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="VetTrack" />
    <!-- 180x180 is the canonical size iOS Safari uses for the home-screen icon.
         Using icon-192 here is intentional — iOS scales it down cleanly. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" />
    <!-- Prevent iOS from auto-linking phone numbers / addresses -->
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
    <!-- Windows tile color -->
    <meta name="msapplication-TileColor" content="#0f1f11" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=DM+Mono:wght@400;500&family=Heebo:wght@400;500;600;700&family=Rubik:wght@400;500;600;700&display=swap"

    />
