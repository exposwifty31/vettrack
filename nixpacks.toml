[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm", "NODE_ENV=development pnpm install --frozen-lockfile"]

[phases.build]
# Mainline deploys must not bake equipment-only pilot UI (VITE_* is compile-time).
cmds = ["sh -c 'if [ \"$ALLOW_EQUIPMENT_PILOT_MODE\" != \"true\" ]; then export VITE_PILOT_MODE=false; fi; pnpm build'"]

[start]
cmd = "pnpm start"