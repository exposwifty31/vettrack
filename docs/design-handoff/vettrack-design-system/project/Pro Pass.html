<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VetTrack — Pro pass</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #eceae2; }
  body { font-family: var(--font-sans); color: var(--foreground); }
  .phone-shell {
    position: relative; width: 360px; height: 760px; border-radius: 44px;
    background: #0f1f11; padding: 12px; overflow: hidden;
    box-shadow: 0 30px 60px -24px rgba(15,31,17,0.45), 0 0 0 1px rgba(0,0,0,0.18);
  }
  .phone-screen {
    width: 100%; height: 100%; border-radius: 32px; overflow: hidden;
    background: var(--background); position: relative;
    display: flex; flex-direction: column;
  }
  .phone-status {
    height: 36px; padding: 6px 22px 0; display: flex; justify-content: space-between; align-items: center;
    font: 600 13px/1 -apple-system, system-ui, sans-serif; color: var(--ivory-text);
    flex-shrink: 0;
  }
  .phone-status .right { display: inline-flex; gap: 6px; align-items: center; }
  .phone-body { flex: 1; overflow: auto; }
  .phone-body::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ui_kits/_shared/Icons.jsx"></script>
  <script type="text/babel" src="ui_kits/app/MobileTopbar.jsx"></script>
  <script type="text/babel" src="ui_kits/app/BottomNav.jsx"></script>
  <script type="text/babel" src="ui_kits/app/Cards.jsx"></script>
  <script type="text/babel" src="variants/V4Magnetic.jsx"></script>
  <script type="text/babel" src="variants/V4Pro.jsx"></script>
  <script type="text/babel" src="ui_kits/app/EquipmentScreenMagnetic.jsx"></script>
  <script type="text/babel" src="ui_kits/app/AlertsScreenMagnetic.jsx"></script>
  <script type="text/babel" src="ui_kits/app/ShiftRecapScreen.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel">
    function Frame({ children, dir, active = "home" }) {
      return (
        <div className="phone-shell">
          <div className="phone-screen" dir={dir}>
            <div className="phone-status">
              <span>9:41</span>
              <span className="right">
                <svg width="14" height="10" viewBox="0 0 14 10" fill="currentColor"><rect x="0" y="6" width="2" height="4" rx="0.5"/><rect x="3.5" y="4" width="2" height="6" rx="0.5"/><rect x="7" y="2" width="2" height="8" rx="0.5"/><rect x="10.5" y="0" width="2" height="10" rx="0.5"/></svg>
                <svg width="22" height="10" viewBox="0 0 22 10" fill="none" stroke="currentColor" strokeWidth="1"><rect x="0.5" y="0.5" width="18" height="9" rx="2"/><rect x="2.5" y="2.5" width="13" height="5" rx="0.5" fill="currentColor"/><rect x="19.5" y="3.5" width="1.5" height="3" rx="0.4" fill="currentColor"/></svg>
              </span>
            </div>
            <div className="phone-body">
              <MobileTopbar title="VetTrack" dir={dir} />
              {children}
            </div>
            <BottomNav active={active} dir={dir} />
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas
          title="VetTrack — The Pro pass"
          subtitle="Same magnetic DNA, tightened for scope & professionalism: one job per screen, the achievement layer moved into its own Recap room, one accent, type over containers. Compare Home before/after, then see the energy applied across screens."
        >
          <DCSection id="home" title="Home — before & after" subtitle="Magnetic v1 ran 7 modules on the work surface. The Pro pass cuts to 3 zones: glance (progress) · reach (the one action) · context list. Streak + pulse moved to Recap.">
            <DCArtboard id="home-v1" label="Before · Magnetic v1" width={392} height={788}>
              <Frame dir="ltr"><V4Magnetic dir="ltr" /></Frame>
            </DCArtboard>
            <DCArtboard id="home-pro" label="After · Pro pass" width={392} height={788}>
              <Frame dir="ltr"><V4Pro dir="ltr" /></Frame>
            </DCArtboard>
          </DCSection>

          <DCSection id="screens" title="The energy, applied" subtitle="Equipment and Alerts follow the same glance/reach split with a single live indicator. Each screen has one clear primary action in the thumb zone.">
            <DCArtboard id="equip" label="Equipment" width={392} height={788}>
              <Frame dir="ltr" active="equip"><EquipmentScreenMagnetic dir="ltr" /></Frame>
            </DCArtboard>
            <DCArtboard id="alerts" label="Alerts" width={392} height={788}>
              <Frame dir="ltr" active="alerts"><AlertsScreenMagnetic dir="ltr" /></Frame>
            </DCArtboard>
          </DCSection>

          <DCSection id="recap" title="The reflecting room — Recap" subtitle="This is where the fun lives: weekly numbers, milestones, a shareable shift card, monthly recap. You choose to visit it. The work screens stay calm.">
            <DCArtboard id="recap-en" label="Recap · EN" width={392} height={920}>
              <Frame dir="ltr" active="alerts"><ShiftRecapScreen dir="ltr" /></Frame>
            </DCArtboard>
            <DCArtboard id="recap-he" label="Recap · HE" width={392} height={920}>
              <Frame dir="rtl" active="alerts"><ShiftRecapScreen dir="rtl" /></Frame>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
