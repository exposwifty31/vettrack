<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VetTrack — Dashboard upgrade · 3 directions</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #f6f4ee; }
  body { font-family: var(--font-sans); color: var(--foreground); }
  .phone-shell {
    position: relative; width: 360px; height: 760px; border-radius: 44px;
    background: #0f1f11; padding: 12px; overflow: hidden;
    box-shadow: 0 30px 60px -24px rgba(15,31,17,0.45), 0 0 0 1px rgba(0,0,0,0.18);
  }
  .phone-screen {
    width: 100%; height: 100%; border-radius: 32px; overflow: hidden;
    background: var(--background); position: relative;
    display: flex; flex-direction: column;
  }
  .phone-status {
    height: 36px; padding: 6px 22px 0; display: flex; justify-content: space-between; align-items: center;
    font: 600 13px/1 -apple-system, system-ui, sans-serif; color: var(--ivory-text);
    flex-shrink: 0;
  }
  .phone-status .right { display: inline-flex; gap: 6px; align-items: center; }
  .phone-body { flex: 1; overflow: auto; }
  .phone-body::-webkit-scrollbar { width: 0; }
  .topbar-thin {
    height: 4px; width: 132px; margin: 4px auto 6px; background: rgba(255,255,255,0.2); border-radius: 4px; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
  }
  .description {
    max-width: 280px; font-size: 12.5px; line-height: 1.5; color: var(--ivory-text-3); text-align: center;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ui_kits/_shared/Icons.jsx"></script>
  <script type="text/babel" src="ui_kits/app/MobileTopbar.jsx"></script>
  <script type="text/babel" src="ui_kits/app/BottomNav.jsx"></script>
  <script type="text/babel" src="ui_kits/app/Cards.jsx"></script>
  <script type="text/babel" src="variants/V1Refined.jsx"></script>
  <script type="text/babel" src="variants/V2Operational.jsx"></script>
  <script type="text/babel" src="variants/V3Calm.jsx"></script>
  <script type="text/babel" src="variants/V4Magnetic.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel">

      ],

    const HE_V2 = {

        { name: "מוניטור uMEC10",     action: "נסרק",               time: "2ד׳" },

    const HE_V4 = {

      sub: "5ש' 12ד' נותרו במשמרת. את עליה.",

      quickHead: "ניצחונות קטנים",
      quick: [
        { icon: "scan",        title: "סרוק משהו",   hint: "QR או NFC",     tint: "primary" },
        { icon: "filePlus",    title: "הוסף משימה",  hint: "או שייך",       tint: "lemon" },
        { icon: "shieldAlert", title: "טפל בהתראות", hint: "3 לבדיקה",      tint: "berry" },
      ],
      pulse: "הרגע",
      pulseText: "סרקת את uMEC10. ICU 1 מסודר.",
      feedHead: "היום",
      feed: [
        { name: "דניאל החזיר SP-118",         time: "23ד׳" },
        { name: "עיקור EQ-0492 בתור",          time: "1ש׳" },
        { name: "עגלת C-2 דורשת אדרנלין",      time: "1ש׳" },
      ],
      end: "נבנה למשמרות כמו שלך.",

    function Frame({ children, dir }) {
      return (
        <div className="phone-shell">
          <div className="phone-screen" dir={dir}>
            <div className="phone-status">
              <span>9:41</span>
              <span className="right">
                <svg width="14" height="10" viewBox="0 0 14 10" fill="currentColor"><rect x="0" y="6" width="2" height="4" rx="0.5"/><rect x="3.5" y="4" width="2" height="6" rx="0.5"/><rect x="7" y="2" width="2" height="8" rx="0.5"/><rect x="10.5" y="0" width="2" height="10" rx="0.5"/></svg>
                <svg width="14" height="10" viewBox="0 0 16 12" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M2 6c1.5-1.5 4.5-3 6-3s4.5 1.5 6 3"/><path d="M4 8c1-1 3-2 4-2s3 1 4 2"/><circle cx="8" cy="10" r="0.8" fill="currentColor"/></svg>

            </div>
            <div className="phone-body">
              <MobileTopbar title="VetTrack" dir={dir} />
              {children}
            </div>
            <BottomNav active="home" dir={dir} />
          </div>
        </div>
      );

    function App() {
      return (
        <DesignCanvas
          title="VetTrack — Home / Dashboard upgrade"
          subtitle="Three directional options · explore, focus, ship the winner. Hebrew and English shown side by side because the product is RTL by default."
        >
          <DCSection id="overview" title="Three directions" subtitle="Each in English and Hebrew. Click any board to focus.">
          </DCSection>

          <DCSection id="v1" title="Variant 1 — Refined" subtitle="Today's DNA, sharper hierarchy. One focal KPI, secondary strip, timeline-rail activity feed. Lowest risk, biggest information uplift.">

              <Frame dir="ltr"><V1Refined dir="ltr" /></Frame>
            </DCArtboard>
            <DCArtboard id="v1-he" label="HE · Refined" width={392} height={788}>
              <Frame dir="rtl"><V1Refined dir="rtl" strings={HE_V1} /></Frame>
            </DCArtboard>
          </DCSection>

          <DCSection id="v2" title="Variant 2 — Operational" subtitle="Bloomberg-terminal density. Mono details, tabular event log, status-led chrome. For teams that live inside the app for whole shifts.">

            </DCArtboard>

              <Frame dir="rtl"><V2Operational dir="rtl" strings={HE_V2} /></Frame>
            </DCArtboard>
          </DCSection>

          <DCSection id="v3" title="Variant 3 — Calm clinical" subtitle="One moment, big touch targets, premium whitespace. The most novel — for clinicians who want the app to disappear except for the next decision.">
            <DCArtboard id="v3-en" label="EN · Calm" width={392} height={788}>
              <Frame dir="ltr"><V3Calm dir="ltr" /></Frame>
            </DCArtboard>
            <DCArtboard id="v3-he" label="HE · Calm" width={392} height={788}>
              <Frame dir="rtl"><V3Calm dir="rtl" strings={HE_V3} /></Frame>
            </DCArtboard>
          </DCSection>

          <DCSection id="v4" title="Variant 4 — Magnetic ✨ new" subtitle="The app you actually want to open. Hero shift-rings that draw in, animated counters, a celebrated win streak, color-blocked quick actions, fresh-event pulse. Tactile, personal, opinionated.">

            </DCArtboard>

              <Frame dir="rtl"><V4Magnetic dir="rtl" strings={HE_V4} /></Frame>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
