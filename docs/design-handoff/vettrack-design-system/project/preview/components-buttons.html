<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 14px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    height: 44px; padding: 0 16px; border-radius: 12px;
    font: 600 14px/1 var(--font-sans);
    border: 1px solid transparent; cursor: pointer; transition: all .2s ease-out;
  }
  .primary    { background: var(--primary); color: #fff; box-shadow: 0 1px 2px 0 rgb(15 23 42 / 0.05); }
  .destructive{ background: var(--destructive); color: #fff; box-shadow: 0 1px 2px 0 rgb(15 23 42 / 0.05); }
  .outline    { background: var(--ivory-surface); color: var(--ivory-text); border-color: var(--ivory-border); }
  .secondary  { background: var(--secondary); color: var(--secondary-foreground); }
  .ghost      { background: transparent; color: var(--ivory-text); }
  .link       { background: transparent; color: var(--primary); text-decoration: underline; text-underline-offset: 4px; padding: 0; height: auto; }
  svg { width: 16px; height: 16px; }
</style>
</head>
<body>
  <div class="grid">
    <button class="btn primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7M3 7l9 6 9-6M3 7l2-2h14l2 2"/></svg>Scan QR</button>
    <button class="btn destructive"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>Delete</button>
    <button class="btn outline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5v14"/></svg>Add</button>
    <button class="btn secondary">Cancel</button>
    <button class="btn ghost">View all</button>
    <button class="btn link">Learn more →</button>
  </div>
</body>
</html>
