<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .row { display: flex; gap: 28px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .box {
    width: 120px; height: 76px; border-radius: 16px;
    background: var(--ivory-surface); border: 1px solid var(--ivory-border);
  }
  .name { font: 600 11.5px/1 var(--font-sans); color: var(--ivory-text); }
  .val  { font: 400 10.5px/1.2 var(--font-mono); color: var(--ivory-text-3); text-align: center; max-width: 130px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item">
      <div class="box"></div>
      <div class="name">flat</div>
      <div class="val">no shadow · capsules, chips, status pills</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: 0 1px 2px 0 rgb(15 23 42 / 0.05), 0 8px 24px -16px rgb(15 23 42 / 0.24)"></div>
      <div class="name">card</div>
      <div class="val">resting cards, headers, sticky bars</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: 0 2px 4px 0 rgb(15 23 42 / 0.06), 0 14px 30px -14px rgb(15 23 42 / 0.28)"></div>
      <div class="name">card hover</div>
      <div class="val">+ translate-y -1px</div>
    </div>
    <div class="item">
      <div class="box" style="background: var(--primary); box-shadow: 0 10px 24px -12px rgb(15 31 17 / 0.45)"></div>
      <div class="name">primary cta</div>
      <div class="val">shadow-lg shadow-primary/25</div>
    </div>
  </div>
</body>
</html>
