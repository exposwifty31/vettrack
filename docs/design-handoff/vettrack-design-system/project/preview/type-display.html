<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .meta { width: 110px; font-family: var(--font-mono); font-size: 10.5px; color: var(--ivory-text-3); letter-spacing: 0.02em; }
  .h1 { font: 800 48px/1.05 var(--font-sans); letter-spacing: -0.025em; }
  .h2 { font: 700 28px/1.15 var(--font-sans); letter-spacing: -0.02em; }
  .h3 { font: 600 18px/1.25 var(--font-sans); }
  .em-span { color: var(--primary); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row">
      <div class="meta">h1 / 48 / 800</div>
      <div class="h1">Find Critical Equipment <span class="em-span">— Not Minutes</span></div>
    </div>
    <div class="row">
      <div class="meta">h2 / 28 / 700</div>
      <div class="h2">Inventory Alerts</div>
    </div>
    <div class="row">
      <div class="meta">h3 / 18 / 600</div>
      <div class="h3">Tracked equipment</div>
    </div>
  </div>
</body>
</html>
