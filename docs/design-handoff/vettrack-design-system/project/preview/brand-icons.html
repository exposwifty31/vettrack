<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  body { padding: 18px 22px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px 12px; }
  .tile { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .chip {
    width: 40px; height: 40px; border-radius: 12px;
    border: 1px solid var(--ivory-border); background: var(--ivory-bg);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .chip svg { width: 18px; height: 18px; color: var(--ivory-text-2); stroke-width: 2; }
  .chip.primary { background: hsl(130 42% 20% / 0.1); border-color: hsl(130 42% 20% / 0.2); }
  .chip.primary svg { color: var(--primary); }
  .chip.danger { background: #fff1f1; border-color: #fca5a5; }
  .chip.danger svg { color: #dc2626; }
  .name { font: 500 10px/1 var(--font-mono); color: var(--ivory-text-3); }
  .legend { font: 500 10.5px/1.4 var(--font-mono); color: var(--ivory-text-3); margin-top: 14px; max-width: 560px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile"><span class="chip primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></span><span class="name">QrCode</span></div>
    <div class="tile"><span class="chip primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/></svg></span><span class="name">Scan</span></div>
    <div class="tile"><span class="chip danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></span><span class="name">Bell</span></div>
    <div class="tile"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span><span class="name">Activity</span></div>
    <div class="tile"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m7.5 4.27 9 5.15M21 8 12 13 3 8M3 8v8l9 5 9-5V8M12 13v8"/></svg></span><span class="name">Package</span></div>
    <div class="tile"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></span><span class="name">Users</span></div>
    <div class="tile"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="9" r="3"/><circle cx="6" cy="13" r="2.5"/><circle cx="18" cy="13" r="2.5"/><circle cx="9" cy="18" r="2.5"/><circle cx="15" cy="18" r="2.5"/></svg></span><span class="name">PawPrint</span></div>
    <div class="tile"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span><span class="name">ListTodo</span></div>

    <div class="tile"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m9 12 2 2 4-4"/><path d="M21 12c0 5-4 9-9 9s-9-4-9-9 4-9 9-9c2 0 4 1 5.5 2"/></svg></span><span class="name">ClipboardCheck</span></div>
    <div class="tile"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M2 9V5a2 2 0 0 1 2-2h2M22 9V5a2 2 0 0 0-2-2h-2M2 15v4a2 2 0 0 0 2 2h2M22 15v4a2 2 0 0 1-2 2h-2"/></svg></span><span class="name">Receipt</span></div>
    <div class="tile"><span class="chip danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span><span class="name">ShieldAlert</span></div>
    <div class="tile"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span><span class="name">MapPin</span></div>
    <div class="tile"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m1 1 22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg></span><span class="name">WifiOff</span></div>
    <div class="tile"><span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m14.7 6.3-1 1a1 1 0 0 0 0 1.4l5.6 5.6a1 1 0 0 0 1.4 0l1-1a6 6 0 0 0-7.92-8.05L9 8l-2-2-3 3 2 2-5 5v3h3l5-5 2 2 3-3-2-2 3.16-3.16Z"/></svg></span><span class="name">Wrench</span></div>
    <div class="tile"><span class="chip primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3v18M3 12h18"/></svg></span><span class="name">Plus</span></div>
    <div class="tile"><span class="chip primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m22 2-7 20-4-9-9-4 20-7Z"/></svg></span><span class="name">Sparkles</span></div>
  </div>
  <div class="legend">All icons are <code>lucide-react</code>, stroke-width 2. Always square chip containers (`rounded-xl` / `rounded-2xl`). Primary tint = primary action. Danger tint = action required.</div>
</body>
</html>
