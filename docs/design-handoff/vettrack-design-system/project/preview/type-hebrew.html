<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .meta { width: 130px; font-family: var(--font-mono); font-size: 10.5px; color: var(--ivory-text-3); direction: ltr; text-align: left; }
  .h1 { font: 800 40px/1.05 var(--font-sans); letter-spacing: 0; }
  .h2 { font: 700 24px/1.2 var(--font-sans); }
  .body { font: 400 16px/1.6 var(--font-sans); }
  .label { font: 500 13px/1.4 var(--font-sans); color: var(--ivory-text-2); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="meta">h1 he</div><div class="h1">VetTrack — מעקב ציוד רפואי</div></div>
    <div class="row"><div class="meta">h2 he</div><div class="h2">מטופלים פעילים</div></div>
    <div class="row"><div class="meta">body he</div><div class="body">סריקה ב-QR או NFC, מעקב לפי חדר, התראות בזמן אמת.</div></div>
    <div class="row"><div class="meta">label he</div><div class="label">היום · 12 משימות · 4 התראות</div></div>
  </div>
</body>
</html>
