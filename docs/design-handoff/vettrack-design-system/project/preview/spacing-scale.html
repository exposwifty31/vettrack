<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .row { display: flex; gap: 12px; align-items: end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--primary); border-radius: 3px; height: 16px; }
  .name { font: 600 10.5px/1 var(--font-mono); color: var(--ivory-text-2); }
  .val  { font: 400 10px/1 var(--font-mono); color: var(--ivory-text-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px"></div><div class="name">1</div><div class="val">4</div></div>
    <div class="item"><div class="bar" style="width:8px"></div><div class="name">2</div><div class="val">8</div></div>
    <div class="item"><div class="bar" style="width:12px"></div><div class="name">3</div><div class="val">12</div></div>
    <div class="item"><div class="bar" style="width:16px"></div><div class="name">4</div><div class="val">16</div></div>
    <div class="item"><div class="bar" style="width:20px"></div><div class="name">5</div><div class="val">20</div></div>
    <div class="item"><div class="bar" style="width:24px"></div><div class="name">6</div><div class="val">24</div></div>
    <div class="item"><div class="bar" style="width:32px"></div><div class="name">8</div><div class="val">32</div></div>
    <div class="item"><div class="bar" style="width:40px"></div><div class="name">10</div><div class="val">40</div></div>
    <div class="item"><div class="bar" style="width:48px"></div><div class="name">12</div><div class="val">48</div></div>
  </div>
</body>
</html>
