<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .kpi {
    background: var(--ivory-surface); border: 1px solid var(--ivory-border);
    border-radius: 16px; padding: 14px; min-height: 120px;
    box-shadow: 0 1px 2px 0 rgb(15 23 42 / 0.05);
    display: flex; flex-direction: column; justify-content: space-between; gap: 10px;
  }
  .top { display: flex; align-items: start; justify-content: space-between; gap: 8px; }
  .title { font: 500 11px/1.2 var(--font-sans); text-transform: uppercase; letter-spacing: 0.06em; color: var(--ivory-text-3); }
  .icon-chip { width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid var(--ivory-border); background: var(--ivory-bg); }
  .icon-chip svg { width: 15px; height: 15px; color: var(--ivory-text-2); }
  .value { font: 700 28px/1 var(--font-sans); color: var(--ivory-text); font-feature-settings: "tnum"; letter-spacing: -0.015em; }
  .sub { font: 400 11px/1.3 var(--font-sans); color: var(--ivory-text-3); }
</style>
</head>
<body>
  <div class="grid">
    <div class="kpi">
      <div class="top"><span class="title">Active patients</span>
        <span class="icon-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
      </div>
      <div>
        <div class="value">18</div>
        <div class="sub">In active treatment</div>
      </div>
    </div>
    <div class="kpi">
      <div class="top"><span class="title">Tasks due</span>
        <span class="icon-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
      </div>
      <div>
        <div class="value">12</div>
        <div class="sub">Today + overdue</div>
      </div>
    </div>
    <div class="kpi">
      <div class="top"><span class="title">Inventory alerts</span>
        <span class="icon-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
      </div>
      <div>
        <div class="value">3</div>
        <div class="sub">Need review</div>
      </div>
    </div>
    <div class="kpi">
      <div class="top"><span class="title">Captured this shift</span>
        <span class="icon-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
      </div>
      <div>
        <div class="value">₪4,820</div>
        <div class="sub">23 items billed</div>
      </div>
    </div>
  </div>
</body>
</html>
