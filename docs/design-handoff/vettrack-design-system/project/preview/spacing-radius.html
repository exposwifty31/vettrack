<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .row { display: flex; gap: 16px; align-items: end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 56px; background: var(--ivory-surface); border: 1px solid var(--ivory-border-md); }
  .name { font: 600 11.5px/1 var(--font-sans); color: var(--ivory-text); }
  .val  { font: 500 10.5px/1 var(--font-mono); color: var(--ivory-text-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">sm</div><div class="val">8px</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="name">md</div><div class="val">10px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">lg · base</div><div class="val">12px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">xl · cards</div><div class="val">16px</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">2xl · hero</div><div class="val">20px</div></div>
    <div class="item"><div class="box" style="border-radius:9999px;width:96px"></div><div class="name">pill</div><div class="val">9999px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">tag</div><div class="val">4px · StatusBadge only</div></div>
  </div>
</body>
</html>
