<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .kicker { font: 600 12px/1 var(--font-sans); letter-spacing: 0.2em; text-transform: uppercase; color: var(--primary); }
  .title { font: 700 28px/1.15 var(--font-sans); letter-spacing: -0.02em; color: var(--ivory-text); margin-top: 8px; }
  .sub { font: 400 14px/1.5 var(--font-sans); color: var(--ivory-text-3); margin-top: 4px; max-width: 460px; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--ivory-text-3); }
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="meta">Section pattern · kicker → h2 → subtitle</div>
    </div>
    <div>
      <div class="kicker">Our Platform</div>
      <div class="title">Built for the way ICU shifts actually work</div>
      <div class="sub">Mobile-first PWA. Scan once, see status everywhere. Offline-capable when the cell signal in the basement drops out.</div>
    </div>
  </div>
</body>
</html>
