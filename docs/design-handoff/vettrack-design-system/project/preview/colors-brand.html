<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .chip {
    display: flex; flex-direction: column; justify-content: space-between;
    height: 132px; padding: 12px; border-radius: 12px;
    border: 1px solid var(--ivory-border);
    font-family: var(--font-sans);
  }
  .chip .name { font-size: 11px; font-weight: 700; letter-spacing: 0.02em; }
  .chip .hex  { font-family: var(--font-mono); font-size: 10.5px; opacity: 0.85; }
  .chip .role { font-size: 10px; opacity: 0.8; }
</style>
</head>
<body>
  <div class="palette">
    <div class="chip" style="background:#0f1f11;color:#ece9e0">
      <div class="name">Navy / Header</div>
      <div>
        <div class="hex">#0f1f11</div>
        <div class="role">PWA theme · global header</div>
      </div>
    </div>
    <div class="chip" style="background:#1e4a25;color:#ffffff">
      <div class="name">Primary Green</div>
      <div>
        <div class="hex">#1e4a25</div>
        <div class="role">Buttons · focus · accent</div>
      </div>
    </div>
    <div class="chip" style="background:#1e7a32;color:#ffffff">
      <div class="name">Green Mid</div>
      <div>
        <div class="hex">#1e7a32</div>
        <div class="role">Emphasis · hover lift</div>
      </div>
    </div>
    <div class="chip" style="background:#4cde6a;color:#0f1f11">
      <div class="name">Scan Lime</div>
      <div>
        <div class="hex">#4cde6a</div>
        <div class="role">Logo · QR motif only</div>
      </div>
    </div>
    <div class="chip" style="background:#e6f2e7;color:#1e4a25;border-color:#cfe5d2">
      <div class="name">Green Tint</div>
      <div>
        <div class="hex">#e6f2e7</div>
        <div class="role">Active item surface</div>
      </div>
    </div>
  </div>
</body>
</html>
