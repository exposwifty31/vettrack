<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .meta { width: 130px; font-family: var(--font-mono); font-size: 10.5px; color: var(--ivory-text-3); }
  .body { font: 400 16px/1.6 var(--font-sans); max-width: 480px; }
  .body-sm { font: 500 14px/1.5 var(--font-sans); color: var(--ivory-text-2); }
  .small { font: 400 12px/1.4 var(--font-sans); color: var(--ivory-text-3); }
  .mono { font: 500 13px/1.4 var(--font-mono); color: var(--ivory-text); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="meta">body / 16 / 400</div><div class="body">VetTrack helps ICU teams find, track, and manage critical equipment in real time.</div></div>
    <div class="row"><div class="meta">body-sm / 14 / 500</div><div class="body-sm">Updated 2 minutes ago · Room 4 · Operational</div></div>
    <div class="row"><div class="meta">small / 12 / 400</div><div class="small">Secure login · Real-time data · No installation required</div></div>
    <div class="row"><div class="meta">mono / 13 / 500</div><div class="mono">EQ-0492 · ECG monitor · ₪ 1,240.00</div></div>
  </div>
</body>
</html>
