<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_shell.css" />
<style>
  .stack { display: flex; flex-direction: column; gap: 12px; max-width: 480px; }
  label { font: 600 11.5px/1 var(--font-sans); color: var(--ivory-text); }
  .field { position: relative; }
  .field svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--ivory-text-3); }
  input, .select {
    width: 100%; height: 44px; padding: 0 16px 0 38px; border-radius: 12px;
    border: 1px solid var(--ivory-border); background: var(--ivory-surface);
    font: 500 14px/1 var(--font-sans); color: var(--ivory-text);
    box-shadow: 0 1px 2px 0 rgb(15 23 42 / 0.04);
    outline: none;
  }
  input:focus { border-color: hsl(130 42% 20% / 0.6); box-shadow: 0 0 0 3px hsl(130 42% 20% / 0.1); }
  input::placeholder { color: var(--ivory-text-3); }
  .select { display: flex; align-items: center; justify-content: space-between; padding-right: 14px; }
  .select::after {
    content: ""; width: 8px; height: 8px; border-right: 2px solid var(--ivory-text-2); border-bottom: 2px solid var(--ivory-text-2);
    transform: rotate(45deg); margin-top: -4px;
  }
</style>
</head>
<body>
  <div class="stack">
    <div>
      <label>Search</label>
      <div class="field" style="margin-top:6px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="Search equipment, serial, model…" />
      </div>
    </div>
    <div>
      <label>Folder</label>
      <div class="field" style="margin-top:6px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <div class="select"><span style="color:var(--ivory-text-2)">All folders</span></div>
      </div>
    </div>
  </div>
</body>
</html>
