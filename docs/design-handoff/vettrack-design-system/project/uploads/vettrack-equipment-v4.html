<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VetTrack — Equipment v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F0EFE9;
    --surface:   #FAFAF7;
    --surface2:  #EFEFEA;
    --border:    rgba(0,0,0,0.08);
    --text-primary:   #1A1F1C;
    --text-secondary: #6B7068;
    --text-muted:     #9EA39B;
    --green-deep:  #1E3A2F;
    --green-mid:   #2D5C45;
    --green-accent:#3D7A5A;
    --green-light: #E8F0EB;
    --amber:       #C97B2A;
    --amber-light: #FDF3E7;
    --red:         #C0392B;
    --red-light:   #FDECEA;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --r-sm: 10px; --r-md: 16px; --r-lg: 22px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:#2C2C2A; display:flex; align-items:center; justify-content:center;
    min-height:100vh; font-family:'DM Sans',sans-serif; padding:40px 20px;
  }
  .phone {
    width:390px; height:844px; background:var(--bg);
    border-radius:52px; overflow:hidden; position:relative;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 30px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(0,0,0,0.3);
    display:flex; flex-direction:column;
  }
  .island { position:absolute; top:14px; left:50%; transform:translateX(-50%); width:120px; height:34px; background:#0a0a0a; border-radius:20px; z-index:100; }

  .statusbar { height:54px; display:flex; align-items:flex-end; justify-content:space-between; padding:0 28px 8px; flex-shrink:0; }
  .statusbar .time { font-family:'DM Mono',monospace; font-size:15px; font-weight:500; color:var(--text-primary); letter-spacing:-0.3px; }
  .statusbar .icons { display:flex; gap:6px; align-items:center; color:var(--text-primary); }

  .header { padding:8px 20px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .header-left { display:flex; align-items:center; gap:10px; }
  .icon-btn { width:36px; height:36px; border-radius:10px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-sm); cursor:pointer; position:relative; }
  .logo-mark { width:36px; height:36px; background:var(--green-deep); border-radius:10px; display:flex; align-items:center; justify-content:center; }
  .brand { font-size:17px; font-weight:600; color:var(--text-primary); letter-spacing:-0.4px; }
  .badge { position:absolute; top:-4px; right:-4px; width:16px; height:16px; background:var(--red); border-radius:50%; font-size:9px; font-weight:600; color:white; display:flex; align-items:center; justify-content:center; border:1.5px solid var(--bg); }

  .scroll { flex:1; overflow-y:auto; padding:0 16px 100px; -webkit-overflow-scrolling:touch; }
  .scroll::-webkit-scrollbar { display:none; }

  /* Big search — the hero CTA */
  .search-hero {
    margin-bottom:20px;
    animation: fadeUp 0.3s ease both;
  }
  .search-hero-bar {
    height:52px; background:var(--surface);
    border:1.5px solid var(--border); border-radius:var(--r-md);
    display:flex; align-items:center; gap:12px; padding:0 18px;
    box-shadow:var(--shadow-md);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-hero-bar:focus-within {
    border-color: var(--green-accent);
    box-shadow: 0 0 0 3px rgba(61,122,90,0.1), var(--shadow-md);
  }
  .search-hero-bar svg { color:var(--text-muted); flex-shrink:0; width:18px; height:18px; }
  .search-hero-bar input {
    flex:1; border:none; background:transparent; outline:none;
    font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text-primary);
  }
  .search-hero-bar input::placeholder { color:var(--text-muted); }
  .scan-inline {
    width:32px; height:32px; border-radius:8px; background:var(--green-deep);
    display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer;
  }
  .scan-inline svg { color:white; width:16px; height:16px; }

  /* Quick action chips */
  .quick-label {
    font-size:10px; font-weight:500; letter-spacing:1.2px;
    text-transform:uppercase; color:var(--text-muted);
    padding:0 2px; margin-bottom:10px;
  }
  .quick-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:8px;
    margin-bottom:24px;
    animation: fadeUp 0.35s 0.05s ease both;
  }
  .quick-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--r-md); padding:16px;
    display:flex; flex-direction:column; gap:10px;
    box-shadow:var(--shadow-sm); cursor:pointer;
    transition:transform 0.1s, box-shadow 0.1s;
  }
  .quick-card:active { transform:scale(0.97); box-shadow:none; }
  .quick-icon {
    width:36px; height:36px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
  }
  .quick-icon.green { background:var(--green-light); }
  .quick-icon.amber { background:var(--amber-light); }
  .quick-icon.red   { background:var(--red-light); }
  .quick-icon.neutral { background:var(--surface2); }
  .quick-icon.green svg { color:var(--green-accent); }
  .quick-icon.amber svg { color:var(--amber); }
  .quick-icon.red   svg { color:var(--red); }
  .quick-icon.neutral svg { color:var(--text-secondary); }
  .quick-icon svg { width:18px; height:18px; }
  .quick-name { font-size:13px; font-weight:500; color:var(--text-primary); letter-spacing:-0.2px; line-height:1.3; }
  .quick-count { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-muted); }

  /* Attention section */
  .section-label {
    font-size:10px; font-weight:500; letter-spacing:1.2px;
    text-transform:uppercase; color:var(--text-muted);
    padding:0 4px; margin-bottom:8px; margin-top:4px;
  }
  .eq-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--r-md); padding:14px 16px; margin-bottom:8px;
    display:flex; align-items:center; gap:12px;
    box-shadow:var(--shadow-sm); cursor:pointer;
    transition:transform 0.1s;
    animation: fadeUp 0.35s ease both;
  }
  .eq-card:active { transform:scale(0.99); }
  .eq-accent { width:3px; border-radius:2px; align-self:stretch; flex-shrink:0; }
  .eq-accent.warn { background:var(--amber); }
  .eq-accent.err  { background:var(--red); }
  .eq-body { flex:1; min-width:0; }
  .eq-name { font-size:14px; font-weight:500; color:var(--text-primary); letter-spacing:-0.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .eq-meta { display:flex; align-items:center; gap:5px; margin-top:3px; }
  .eq-id { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-muted); }
  .eq-dot { width:3px; height:3px; border-radius:50%; background:var(--text-muted); opacity:0.4; }
  .eq-loc { font-size:11px; color:var(--text-muted); }
  .eq-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
  .status-pill { padding:3px 10px; border-radius:100px; font-size:11px; font-weight:500; }
  .status-pill.warn { background:var(--amber-light); color:var(--amber); }
  .status-pill.err  { background:var(--red-light);   color:var(--red); }
  .eq-time { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-muted); }

  /* Bottom nav */
  .bottomnav {
    position:absolute; bottom:0; left:0; right:0; height:88px;
    background:rgba(240,239,233,0.92); backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    display:flex; align-items:flex-start; justify-content:space-around; padding-top:10px;
  }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; cursor:pointer; padding-top:2px; }
  .nav-item svg { width:22px; height:22px; color:var(--text-muted); }
  .nav-item.active svg { color:var(--green-deep); }
  .nav-label { font-size:10px; font-weight:500; color:var(--text-muted); }
  .nav-item.active .nav-label { color:var(--green-deep); }
  .nav-fab { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding-top:2px; cursor:pointer; }
  .fab-circle { width:48px; height:48px; border-radius:16px; background:var(--green-deep); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(30,58,47,0.4); margin-top:-14px; }
  .fab-circle svg { color:white; width:22px; height:22px; }
  .fab-label { font-size:10px; font-weight:500; color:var(--green-deep); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="phone">
  <div class="island"></div>

  <div class="statusbar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="currentColor" opacity="0.3"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="currentColor" opacity="0.5"/><rect x="9" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.7"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="currentColor" opacity="0.5"/><circle cx="8" cy="10" r="1.5" fill="currentColor"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="currentColor"/></svg>
    </div>
  </div>

  <div class="header">
    <div class="header-left">
      <div class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="#1A1F1C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="1.5" fill="white"/><rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity="0.6"/><rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.6"/><rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.3"/></svg>
      </div>
      <span class="brand">Equipment</span>
    </div>
    <div class="icon-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 2C8.2 2 6 4.2 6 7V12L4 15H14L12 12V7C12 4.2 9.8 2 11 2Z" stroke="#1A1F1C" stroke-width="1.4" fill="none"/><path d="M9 15C9 16.1 9.9 17 11 17" stroke="#1A1F1C" stroke-width="1.4"/></svg>
      <div class="badge">3</div>
    </div>
  </div>

  <div class="scroll">

    <!-- Hero search -->
    <div class="search-hero">
      <div class="search-hero-bar">
        <svg viewBox="0 0 18 18" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M12.5 12.5L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" placeholder="Search by name or ID…" />
        <div class="scan-inline">
          <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="white" stroke-width="1.3"/><rect x="10" y="1" width="5" height="5" rx="1" stroke="white" stroke-width="1.3"/><rect x="1" y="10" width="5" height="5" rx="1" stroke="white" stroke-width="1.3"/><path d="M10 10h5M15 10v5M10 15h5" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>
        </div>
      </div>
    </div>

    <!-- Quick access grid -->
    <div class="quick-label">Browse by status</div>
    <div class="quick-grid">

      <div class="quick-card">
        <div class="quick-icon green">
          <svg viewBox="0 0 18 18" fill="none"><path d="M3 9L7.5 13.5L15 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div>
          <div class="quick-name">Available</div>
          <div class="quick-count">28 items</div>
        </div>
      </div>

      <div class="quick-card">
        <div class="quick-icon neutral">
          <svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M9 5.5V9.5L11.5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div>
          <div class="quick-name">In use</div>
          <div class="quick-count">4 items</div>
        </div>
      </div>

      <div class="quick-card">
        <div class="quick-icon amber">
          <svg viewBox="0 0 18 18" fill="none"><path d="M9 3v7M9 13.5v1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="9" cy="9" r="7.5" stroke="currentColor" stroke-width="1.4"/></svg>
        </div>
        <div>
          <div class="quick-name">Needs restock</div>
          <div class="quick-count">2 items</div>
        </div>
      </div>

      <div class="quick-card">
        <div class="quick-icon red">
          <svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M9 5.5V10M9 12.5v.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </div>
        <div>
          <div class="quick-name">Overdue check</div>
          <div class="quick-count">1 item</div>
        </div>
      </div>

    </div>

    <!-- Only show what needs action -->
    <div class="section-label">Needs Attention</div>

    <div class="eq-card">
      <div class="eq-accent err"></div>
      <div class="eq-body">
        <div class="eq-name">Defibrillator DEF-01</div>
        <div class="eq-meta">
          <span class="eq-id">DEF-01</span>
          <span class="eq-dot"></span>
          <span class="eq-loc">ICU 1 · Bay 2</span>
        </div>
      </div>
      <div class="eq-right">
        <div class="status-pill err">Overdue</div>
        <div class="eq-time">3d ago</div>
      </div>
    </div>

    <div class="eq-card" style="animation-delay:0.04s">
      <div class="eq-accent warn"></div>
      <div class="eq-body">
        <div class="eq-name">Crash Cart C-2</div>
        <div class="eq-meta">
          <span class="eq-id">CC-02</span>
          <span class="eq-dot"></span>
          <span class="eq-loc">ICU 2 · Corridor</span>
        </div>
      </div>
      <div class="eq-right">
        <div class="status-pill warn">Low stock</div>
        <div class="eq-time">2h ago</div>
      </div>
    </div>

  </div>

  <div class="bottomnav">
    <div class="nav-item">
      <svg viewBox="0 0 22 22" fill="none"><path d="M3 9.5L11 3L19 9.5V19H14V14H8V19H3V9.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/></svg>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 22 22" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="12" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="12" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="12" y="12" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
      <span class="nav-label">Equipment</span>
    </div>
    <div class="nav-fab">
      <div class="fab-circle">
        <svg viewBox="0 0 22 22" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.2" stroke="white" stroke-width="1.5"/><rect x="12" y="3" width="7" height="7" rx="1.2" stroke="white" stroke-width="1.5"/><rect x="3" y="12" width="7" height="7" rx="1.2" stroke="white" stroke-width="1.5"/><path d="M15.5 12v7M12 15.5h7" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <span class="fab-label">Scan</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 22 22" fill="none"><path d="M11 3L13.5 8.5H19L14.5 12L16.5 18L11 14.5L5.5 18L7.5 12L3 8.5H8.5L11 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      <span class="nav-label">Recap</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 22 22" fill="none"><path d="M11 2C8.2 2 6 4.2 6 7V12L4 15H18L16 12V7C16 4.2 13.8 2 11 2Z" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M9 15C9 16.1 9.9 17 11 17C12.1 17 13 16.1 13 15" stroke="currentColor" stroke-width="1.5"/></svg>
      <span class="nav-label">Alerts</span>
    </div>
  </div>

</div>
</body>
</html>
