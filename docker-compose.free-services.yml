version: '3.8'\n\nservices:\n  # Meilisearch: Free search engine (patient search, appointment search)\n  meilisearch:\n    image: getmeili/meilisearch:latest\n    container_name: vettrack-meilisearch\n    ports:\n      - \"7700:7700\"\n    environment:\n      MEILI_ENV: development\n      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-masterKey}\n    volumes:\n      - meilisearch-data:/meili_data\n    networks:\n      - vettrack\n    healthcheck:\n      test: curl -f http://localhost:7700/health || exit 1\n      interval: 10s\n      timeout: 5s\n      retries: 3\n\n  # Kafka: Free message queue (event sourcing, audit trail, decoupling)\n  zookeeper:\n    image: confluentinc/cp-zookeeper:7.5.0\n    container_name: vettrack-zookeeper\n    environment:\n      ZOOKEEPER_CLIENT_PORT: 2181\n      ZOOKEEPER_TICK_TIME: 2000\n    ports:\n      - \"2181:2181\"\n    networks:\n      - vettrack\n\n  kafka:\n    image: confluentinc/cp-kafka:7.5.0\n    container_name: vettrack-kafka\n    depends_on:\n      - zookeeper\n    ports:\n      - \"9092:9092\"\n    environment:\n      KAFKA_BROKER_ID: 1\n      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181\n      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092\n      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT\n      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT\n      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1\n      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'\n    networks:\n      - vettrack\n    healthcheck:\n      test: kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1\n      interval: 10s\n      timeout: 5s\n      retries: 3\n\n  # Grafana: Free dashboards (clinic metrics, analytics)\n  grafana:\n    image: grafana/grafana:latest\n    container_name: vettrack-grafana\n    ports:\n      - \"3001:3000\"\n    environment:\n      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}\n      GF_INSTALL_PLUGINS: grafana-piechart-panel\n    volumes:\n      - grafana-data:/var/lib/grafana\n      - ./grafana/provisioning:/etc/grafana/provisioning\n    networks:\n      - vettrack\n    depends_on:\n      - postgres\n    healthcheck:\n      test: curl -f http://localhost:3000/api/health || exit 1\n      interval: 10s\n      timeout: 5s\n      retries: 3\n\n  # Elasticsearch: Free logging and search (centralized logs)\n  elasticsearch:\n    image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0\n    container_name: vettrack-elasticsearch\n    environment:\n      - discovery.type=single-node\n      - xpack.security.enabled=false\n      - \"ES_JAVA_OPTS=-Xms512m -Xmx512m\"\n    ports:\n      - \"9200:9200\"\n    volumes:\n      - elasticsearch-data:/usr/share/elasticsearch/data\n    networks:\n      - vettrack\n    healthcheck:\n      test: curl -f http://localhost:9200/_cluster/health || exit 1\n      interval: 10s\n      timeout: 5s\n      retries: 3\n\n  # Logstash: Log aggregation\n  logstash:\n    image: docker.elastic.co/logstash/logstash:8.0.0\n    container_name: vettrack-logstash\n    ports:\n      - \"5000:5000/udp\"\n      - \"9600:9600\"\n    environment:\n      LS_JAVA_OPTS: \"-Xmx256m -Xms256m\"\n    volumes:\n      - ./logstash/pipeline:/usr/share/logstash/pipeline\n    networks:\n      - vettrack\n    depends_on:\n      - elasticsearch\n\n  # Kibana: Log visualization\n  kibana:\n    image: docker.elastic.co/kibana/kibana:8.0.0\n    container_name: vettrack-kibana\n    ports:\n      - \"5601:5601\"\n    environment:\n      ELASTICSEARCH_HOSTS: http://elasticsearch:9200\n    networks:\n      - vettrack\n    depends_on:\n      - elasticsearch\n    healthcheck:\n      test: curl -f http://localhost:5601/api/status || exit 1\n      interval: 10s\n      timeout: 5s\n      retries: 3\n\n  # Postgres: Your existing database (with TimescaleDB)\n  postgres:\n    image: timescale/timescaledb:latest-pg15\n    container_name: vettrack-postgres\n    environment:\n      POSTGRES_DB: vettrack\n      POSTGRES_USER: ${POSTGRES_USER:-postgres}\n      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}\n    ports:\n      - \"5432:5432\"\n    volumes:\n      - postgres-data:/var/lib/postgresql/data\n    networks:\n      - vettrack\n    healthcheck:\n      test: pg_isready -U ${POSTGRES_USER:-postgres} -d vettrack || exit 1\n      interval: 10s\n      timeout: 5s\n      retries: 3\n\n  # Redis: Session/cache (you already have this)\n  redis:\n    image: redis:8.2.1\n    container_name: vettrack-redis\n    ports:\n      - \"6379:6379\"\n    command: redis-server --appendonly yes\n    volumes:\n      - redis-data:/data\n    networks:\n      - vettrack\n    healthcheck:\n      test: redis-cli ping || exit 1\n      interval: 10s\n      timeout: 5s\n      retries: 3\n\n  # Mattermost: Free team chat (internal use)\n  mattermost:\n    image: mattermost/mattermost-team-edition:latest\n    container_name: vettrack-mattermost\n    ports:\n      - \"8065:8065\"\n    environment:\n      MM_SERVICESETTINGS_SITEURL: http://localhost:8065\n      MM_SQLSETTINGS_DRIVERNAME: postgres\n      MM_SQLSETTINGS_DATASOURCE: \"postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/mattermost?sslmode=disable&connect_timeout=10\"\n    volumes:\n      - mattermost-data:/mattermost/data\n      - mattermost-logs:/mattermost/logs\n      - mattermost-config:/mattermost/config\n    networks:\n      - vettrack\n    depends_on:\n      - postgres\n    healthcheck:\n      test: curl -f http://localhost:8065/api/v4/system/ping || exit 1\n      interval: 10s\n      timeout: 5s\n      retries: 3\n\nnetworks:\n  vettrack:\n    driver: bridge\n\nvolumes:\n  meilisearch-data:\n  elasticsearch-data:\n  grafana-data:\n  postgres-data:\n  redis-data:\n  mattermost-data:\n  mattermost-logs:\n  mattermost-config:\n"
